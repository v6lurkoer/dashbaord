<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Template</title>
    <meta charset="UTF-8"/>
    <link href="./style.css" rel="stylesheet"/>
<!--    <script src="./script.js" defer></script>-->
  </head>
  <body>
    <div id="container">
      <header>
        <section id="search-bar">
          <label for="search">Search</label>
          <input type="search" id="search" name="search"/>
        </section>
        <section id="utility">
          <button id="bell">Bell</button>
          <div id="avatar">
            <img src="./img/kagura.png" alt="User avatar"/>
          </div>
          <button id="profile">Kagura-chan</button>
        </section>
        <section id="user-greet">
          <div id="avatar-large">
            <img src="./img/kagura.png" alt="User avatar"/>
          </div>
          <section id="greet">
            <p>Ohayo!</p>
            <h1>Kagura-chan (@kagura)</h1>
          </section>
        </section>
        <section id="content-buttons">
          <button id="new">New</button>
          <button id="upload">Upload</button>
          <button id="share">Share</button>
        </sections>
      </header>
      <div id="sidebar">
      </div>
      <div id="main">
      </div>
    </div>
  </body>
</html>
